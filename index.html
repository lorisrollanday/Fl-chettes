<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compteur de Fléchettes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #18181f;
    --surface2: #22222c;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: #888899;
    --accent: #e8c84a;
    --accent2: #4ae8a0;
    --danger: #e84a4a;
    --bull-outer: #2a9d3a;
    --bull-inner: #e83030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* SETUP SCREEN */
  #setup-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
  }
  .setup-logo {
    font-family: 'Bebas Neue', cursive;
    font-size: 4rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin-bottom: 0.25rem;
  }
  .setup-sub {
    color: var(--muted);
    font-size: 0.875rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }
  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 480px;
  }
  .setup-label {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }
  .score-options {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    margin-bottom: 2rem;
  }
  .score-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Bebas Neue', cursive;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    padding: 0.75rem 0;
    cursor: pointer;
    transition: all 0.15s;
  }
  .score-btn:hover { border-color: var(--accent); color: var(--accent); }
  .score-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0f13;
  }
  .players-section { margin-bottom: 2rem; }
  .player-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
    align-items: center;
  }
  .player-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 0.6rem 0.9rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .player-input:focus { border-color: var(--accent); }
  .remove-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.5rem 0.6rem;
    transition: all 0.15s;
  }
  .remove-btn:hover { border-color: var(--danger); color: var(--danger); }
  .add-player-btn {
    background: none;
    border: 1px dashed var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.6rem;
    width: 100%;
    transition: all 0.15s;
    margin-bottom: 1.5rem;
  }
  .add-player-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .start-btn {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: #0f0f13;
    cursor: pointer;
    font-family: 'Bebas Neue', cursive;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    padding: 0.9rem;
    width: 100%;
    transition: opacity 0.15s, transform 0.1s;
  }
  .start-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }

  /* GAME SCREEN */
  #game-screen { display: none; }
  .game-layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .game-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    color: var(--accent);
  }
  .game-mode-badge {
    background: var(--surface2);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.25rem 0.6rem;
    text-transform: uppercase;
  }
  .players-list { flex: 1; }
  .player-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 0.75rem;
    padding: 1rem 1.1rem;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .player-card.active {
    border-color: var(--accent);
  }
  .player-card.active::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .player-card.eliminated { opacity: 0.4; }
  .player-name-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.35rem;
  }
  .player-name {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--muted);
  }
  .player-card.active .player-name { color: var(--accent); }
  .active-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    display: none;
  }
  .player-card.active .active-dot { display: block; }
  .player-score {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.4rem;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .player-throws {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.25rem;
    min-height: 1rem;
  }
  .throw-badge {
    display: inline-block;
    background: var(--surface);
    border-radius: 4px;
    padding: 0 5px;
    margin-right: 3px;
    font-size: 0.7rem;
  }
  .throw-badge.triple { color: #f5a623; }
  .throw-badge.double { color: #7bc8f0; }
  .throw-badge.bull { color: var(--danger); }

  /* Sidebar actions */
  .sidebar-actions {
    margin-top: auto;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
  }
  .action-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.78rem;
    padding: 0.6rem;
    transition: all 0.15s;
    text-align: center;
  }
  .action-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .action-btn.danger:hover { color: var(--danger); border-color: var(--danger); }

  /* Main area */
  .main-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 2rem 4rem;
  }
  .turn-header {
    text-align: center;
    margin-bottom: 1.5rem;
    width: 100%;
    max-width: 540px;
  }
  .turn-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .turn-name {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.5rem;
    letter-spacing: 0.04em;
    color: var(--accent);
  }
  .throws-counter {
    display: flex;
    gap: 0.4rem;
    justify-content: center;
    margin-top: 0.5rem;
  }
  .throw-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 1.5px solid var(--muted);
    transition: background 0.15s;
  }
  .throw-dot.used { background: var(--accent); border-color: var(--accent); }

  /* Dart board */
  .dartboard-wrap {
    position: relative;
    margin-bottom: 1.5rem;
  }
  #dartboard {
    cursor: crosshair;
    display: block;
    filter: drop-shadow(0 8px 32px rgba(0,0,0,0.6));
  }
  .hit-flash {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bebas Neue', cursive;
    font-size: 3rem;
    color: var(--accent);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    text-shadow: 0 0 20px rgba(232,200,74,0.8);
  }

  /* Current throw display */
  .current-throws {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    width: 100%;
    max-width: 540px;
    justify-content: center;
  }
  .throw-slot {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem;
    text-align: center;
    min-height: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
  }
  .throw-slot.active { border-color: var(--accent); }
  .throw-slot-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }
  .throw-slot-value {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.8rem;
    color: var(--text);
    letter-spacing: 0.03em;
  }
  .throw-slot-mult {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }
  .throw-slot.slot-triple .throw-slot-value { color: #f5a623; }
  .throw-slot.slot-double .throw-slot-value { color: #7bc8f0; }
  .throw-slot.slot-bull .throw-slot-value { color: var(--danger); }

  /* Controls */
  .game-controls {
    display: flex;
    gap: 0.75rem;
    width: 100%;
    max-width: 540px;
    justify-content: center;
  }
  .ctrl-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0.7rem 1.2rem;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: rgba(255,255,255,0.25); }
  .ctrl-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0f13;
    font-weight: 600;
    flex: 1;
  }
  .ctrl-btn.primary:hover { opacity: 0.9; }
  .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Bust indicator */
  .bust-msg {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.5rem;
    color: var(--danger);
    letter-spacing: 0.1em;
    min-height: 2rem;
    text-align: center;
    margin-bottom: 0.5rem;
    width: 100%;
    max-width: 540px;
  }

  /* Win screen */
  #win-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .win-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 3rem;
    text-align: center;
    max-width: 380px;
    width: 90%;
  }
  .win-emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }
  .win-title {
    font-family: 'Bebas Neue', cursive;
    font-size: 1.2rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .win-name {
    font-family: 'Bebas Neue', cursive;
    font-size: 3.5rem;
    letter-spacing: 0.05em;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }
  .win-stats {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .win-btns { display: flex; gap: 0.75rem; justify-content: center; }
  .win-btn {
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0.75rem 1.5rem;
    transition: all 0.15s;
  }
  .win-btn.primary { background: var(--accent); border-color: var(--accent); color: #0f0f13; font-weight: 600; }
  .win-btn.secondary { background: none; color: var(--text); }
  .win-btn.secondary:hover { border-color: rgba(255,255,255,0.3); }

  /* Mobile */
  @media (max-width: 700px) {
    .game-layout { grid-template-columns: 1fr; }
    .sidebar {
      position: static;
      height: auto;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 1rem;
    }
    .sidebar-header { width: 100%; }
    .players-list { display: flex; gap: 0.5rem; flex: 1 0 100%; overflow-x: auto; }
    .player-card { min-width: 120px; flex-shrink: 0; margin-bottom: 0; }
    .sidebar-actions { flex: 1 0 100%; margin-top: 0.5rem; padding-top: 0.75rem; }
    .main-area { padding: 1rem 1rem 3rem; }
    #dartboard { width: 300px; height: 300px; }
  }
  @media (max-width: 400px) {
    #dartboard { width: 260px; height: 260px; }
  }
</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen">
  <div class="setup-logo">🎯 Fléchettes</div>
  <div class="setup-sub">Compteur de score</div>
  <div class="setup-card">
    <div class="setup-label">Score de départ</div>
    <div class="score-options" id="score-options">
      <button class="score-btn" data-val="101">101</button>
      <button class="score-btn active" data-val="301">301</button>
      <button class="score-btn" data-val="501">501</button>
      <button class="score-btn" data-val="701">701</button>
    </div>

    <div class="players-section">
      <div class="setup-label">Joueurs</div>
      <div id="players-inputs"></div>
      <button class="add-player-btn" id="add-player-btn">+ Ajouter un joueur</button>
    </div>

    <button class="start-btn" id="start-btn">COMMENCER LA PARTIE</button>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div class="game-layout">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="game-title">🎯 Fléchettes</div>
        <div class="game-mode-badge" id="mode-badge">501</div>
      </div>
      <div class="players-list" id="players-list"></div>
      <div class="sidebar-actions">
        <button class="action-btn" id="undo-btn">↩ Annuler</button>
        <button class="action-btn danger" id="reset-btn">↺ Recommencer</button>
      </div>
    </div>

    <!-- Main -->
    <div class="main-area">
      <div class="turn-header">
        <div class="turn-label">Tour de</div>
        <div class="turn-name" id="turn-name">—</div>
        <div class="throws-counter" id="throws-counter"></div>
      </div>

      <div class="dartboard-wrap">
        <canvas id="dartboard" width="420" height="420"></canvas>
        <div class="hit-flash" id="hit-flash"></div>
      </div>

      <div class="bust-msg" id="bust-msg"></div>

      <div class="current-throws" id="current-throws">
        <div class="throw-slot active" id="slot-0"><div class="throw-slot-label">1ère</div><div class="throw-slot-value">—</div><div class="throw-slot-mult"></div></div>
        <div class="throw-slot" id="slot-1"><div class="throw-slot-label">2ème</div><div class="throw-slot-value">—</div><div class="throw-slot-mult"></div></div>
        <div class="throw-slot" id="slot-2"><div class="throw-slot-label">3ème</div><div class="throw-slot-value">—</div><div class="throw-slot-mult"></div></div>
      </div>

      <div class="game-controls">
        <button class="ctrl-btn" id="miss-btn">Raté</button>
        <button class="ctrl-btn primary" id="confirm-btn" disabled>Valider le tour →</button>
      </div>
    </div>
  </div>
</div>

<!-- WIN SCREEN -->
<div id="win-screen">
  <div class="win-card">
    <span class="win-emoji">🏆</span>
    <div class="win-title">Vainqueur</div>
    <div class="win-name" id="win-name">—</div>
    <div class="win-stats" id="win-stats"></div>
    <div class="win-btns">
      <button class="win-btn secondary" id="win-setup-btn">Nouvelle partie</button>
      <button class="win-btn primary" id="win-rematch-btn">Revanche !</button>
    </div>
  </div>
</div>

<script>
// === STATE ===
let startScore = 301;
let players = [];
let currentIdx = 0;
let currentThrows = [];
let history = [];
let roundNum = 1;
let totalThrowsCount = [];

const SECTORS = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];

// === URL STATE ===
function encodeState(state) {
  return btoa(encodeURIComponent(JSON.stringify(state)));
}
function decodeState(str) {
  try { return JSON.parse(decodeURIComponent(atob(str))); } catch { return null; }
}
function saveToURL() {
  const state = { startScore, players, currentIdx, history, roundNum, totalThrowsCount };
  const encoded = encodeState(state);
  history_push(encoded);
}
function history_push(encoded) {
  const url = new URL(window.location.href);
  url.searchParams.set('g', encoded);
  window.history.replaceState({}, '', url.toString());
}
function loadFromURL() {
  const url = new URL(window.location.href);
  const g = url.searchParams.get('g');
  if (!g) return false;
  const state = decodeState(g);
  if (!state) return false;
  startScore = state.startScore;
  players = state.players;
  currentIdx = state.currentIdx;
  history = state.history || [];
  roundNum = state.roundNum || 1;
  totalThrowsCount = state.totalThrowsCount || players.map(() => 0);
  return true;
}

// === SETUP ===
let playerNames = ['Joueur 1', 'Joueur 2'];

function renderSetup() {
  const container = document.getElementById('players-inputs');
  container.innerHTML = '';
  playerNames.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `
      <input class="player-input" placeholder="Nom du joueur" value="${name}" data-idx="${i}">
      ${playerNames.length > 1 ? `<button class="remove-btn" data-idx="${i}">✕</button>` : ''}
    `;
    container.appendChild(row);
  });
  container.querySelectorAll('.player-input').forEach(inp => {
    inp.addEventListener('input', e => { playerNames[+e.target.dataset.idx] = e.target.value; });
  });
  container.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      playerNames.splice(+e.target.dataset.idx, 1);
      renderSetup();
    });
  });
}

document.querySelectorAll('.score-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.score-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    startScore = +btn.dataset.val;
  });
});

document.getElementById('add-player-btn').addEventListener('click', () => {
  if (playerNames.length < 8) {
    playerNames.push('Joueur ' + (playerNames.length + 1));
    renderSetup();
  }
});

document.getElementById('start-btn').addEventListener('click', () => {
  const names = playerNames.map((n, i) => {
    const inp = document.querySelector(`.player-input[data-idx="${i}"]`);
    return (inp ? inp.value.trim() : n) || ('Joueur ' + (i+1));
  });
  initGame(startScore, names);
});

renderSetup();

// === GAME INIT ===
function initGame(score, names) {
  startScore = score;
  players = names.map(name => ({ name, score: score, history: [] }));
  currentIdx = 0;
  currentThrows = [];
  history = [];
  roundNum = 1;
  totalThrowsCount = names.map(() => 0);
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('mode-badge').textContent = score;
  renderBoard();
  renderSidebar();
  renderThrowSlots();
  saveToURL();
}

function resumeGame() {
  currentThrows = [];
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('mode-badge').textContent = startScore;
  renderBoard();
  renderSidebar();
  renderThrowSlots();
}

// === DARTBOARD DRAWING ===
const canvas = document.getElementById('dartboard');
const ctx = canvas.getContext('2d');
const CX = 210, CY = 210, R = 200;

const COLORS = {
  dark: '#1a1a1a',
  light: '#e8dcc8',
  red: '#c0392b',
  green: '#27ae60',
  wire: '#555'
};

function drawBoard() {
  ctx.clearRect(0, 0, 420, 420);
  const N = 20;
  const segAngle = (2 * Math.PI) / N;
  const startOffset = -Math.PI / 2 - segAngle / 2;
  const rOuter = R * 0.97;
  const rDouble = R * 0.90;
  const rDoubleInner = R * 0.84;
  const rTriple = R * 0.54;
  const rTripleInner = R * 0.48;
  const rSingle = R * 0.155;
  const rBull = R * 0.062;

  // Outer black ring
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, 2*Math.PI);
  ctx.fillStyle = '#111'; ctx.fill();

  for (let i = 0; i < N; i++) {
    const a1 = startOffset + i * segAngle;
    const a2 = a1 + segAngle;
    const isEven = i % 2 === 0;
    const baseColor = isEven ? COLORS.dark : COLORS.light;
    const ringColor = isEven ? COLORS.red : COLORS.green;

    // Single outer
    drawSegment(a1, a2, rDoubleInner, rTriple, baseColor);
    // Single inner
    drawSegment(a1, a2, rTripleInner, rSingle, baseColor);
    // Double
    drawSegment(a1, a2, rDouble, rDoubleInner, ringColor);
    // Triple
    drawSegment(a1, a2, rTriple, rTripleInner, ringColor);
  }

  // Bull outer (25)
  ctx.beginPath(); ctx.arc(CX, CY, rSingle, 0, 2*Math.PI);
  ctx.fillStyle = COLORS.green; ctx.fill();
  // Bull inner (50)
  ctx.beginPath(); ctx.arc(CX, CY, rBull, 0, 2*Math.PI);
  ctx.fillStyle = COLORS.red; ctx.fill();

  // Wire lines
  ctx.strokeStyle = COLORS.wire;
  ctx.lineWidth = 1.2;
  for (let i = 0; i < N; i++) {
    const a = startOffset + i * segAngle;
    ctx.beginPath();
    ctx.moveTo(CX + rBull * Math.cos(a), CY + rBull * Math.sin(a));
    ctx.lineTo(CX + rOuter * Math.cos(a), CY + rOuter * Math.sin(a));
    ctx.stroke();
  }
  [rBull, rSingle, rTripleInner, rTriple, rDoubleInner, rDouble].forEach(r => {
    ctx.beginPath(); ctx.arc(CX, CY, r, 0, 2*Math.PI); ctx.stroke();
  });

  // Numbers
  ctx.fillStyle = '#f0f0f5';
  ctx.font = 'bold 15px DM Sans, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const rNum = R * 0.935;
  for (let i = 0; i < N; i++) {
    const a = startOffset + (i + 0.5) * segAngle;
    ctx.fillText(SECTORS[i], CX + rNum * Math.cos(a), CY + rNum * Math.sin(a));
  }
}

function drawSegment(a1, a2, rInner, rOuter, color) {
  ctx.beginPath();
  ctx.arc(CX, CY, rOuter, a1, a2);
  ctx.arc(CX, CY, rInner, a2, a1, true);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function renderBoard() { drawBoard(); }

// === BOARD CLICK ===
canvas.addEventListener('click', e => {
  if (currentThrows.length >= 3) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = 420 / rect.width;
  const scaleY = 420 / rect.height;
  const x = (e.clientX - rect.left) * scaleX - CX;
  const y = (e.clientY - rect.top) * scaleY - CY;
  const dist = Math.sqrt(x*x + y*y);
  const angle = Math.atan2(y, x);

  const N = 20;
  const segAngle = (2 * Math.PI) / N;
  const startOffset = -Math.PI / 2 - segAngle / 2;
  let normAngle = angle - startOffset;
  while (normAngle < 0) normAngle += 2*Math.PI;
  while (normAngle >= 2*Math.PI) normAngle -= 2*Math.PI;
  const segIdx = Math.floor(normAngle / segAngle) % N;
  const sector = SECTORS[segIdx];

  const rOuter = R * 0.97;
  const rDouble = R * 0.90;
  const rDoubleInner = R * 0.84;
  const rTriple = R * 0.54;
  const rTripleInner = R * 0.48;
  const rSingle = R * 0.155;
  const rBull = R * 0.062;

  let score, label, mult;
  if (dist > rOuter) return;
  if (dist <= rBull) { score = 50; label = 'BULL'; mult = 'bull'; }
  else if (dist <= rSingle) { score = 25; label = '25'; mult = 'bull'; }
  else if (dist <= rTripleInner) { score = sector; label = String(sector); mult = ''; }
  else if (dist <= rTriple) { score = sector * 3; label = 'x3 ' + sector; mult = 'triple'; }
  else if (dist <= rDoubleInner) { score = sector; label = String(sector); mult = ''; }
  else if (dist <= rDouble) { score = sector * 2; label = 'x2 ' + sector; mult = 'double'; }
  else { score = sector; label = String(sector); mult = ''; }

  registerThrow(score, label, mult);
});

function registerThrow(score, label, mult) {
  currentThrows.push({ score, label, mult });
  totalThrowsCount[currentIdx]++;
  renderThrowSlots();
  checkBust();
  showHitFlash('+' + score);
  if (currentThrows.length === 3) autoConfirm();
}

function showHitFlash(text) {
  const el = document.getElementById('hit-flash');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 600);
}

function checkBust() {
  const turnScore = currentThrows.reduce((s, t) => s + t.score, 0);
  const remaining = players[currentIdx].score - turnScore;
  const bust = document.getElementById('bust-msg');
  if (remaining < 0 || remaining === 1) {
    bust.textContent = 'BUST ! Score annulé';
  } else {
    bust.textContent = '';
  }
  document.getElementById('confirm-btn').disabled = currentThrows.length === 0;
}

function autoConfirm() {
  setTimeout(() => confirmTurn(), 400);
}

function confirmTurn() {
  if (currentThrows.length === 0) return;
  const turnScore = currentThrows.reduce((s, t) => s + t.score, 0);
  const remaining = players[currentIdx].score - turnScore;

  // Save to history
  history.push({ playerIdx: currentIdx, throws: [...currentThrows], oldScore: players[currentIdx].score });

  if (remaining < 0 || remaining === 1) {
    // Bust
    players[currentIdx].history.push({ throws: currentThrows, result: 'bust', oldScore: players[currentIdx].score });
  } else if (remaining === 0) {
    // WIN
    players[currentIdx].score = 0;
    players[currentIdx].history.push({ throws: currentThrows, result: 'win', oldScore: players[currentIdx].score + turnScore });
    triggerWin();
    return;
  } else {
    players[currentIdx].score = remaining;
    players[currentIdx].history.push({ throws: currentThrows, result: 'ok', oldScore: players[currentIdx].score + turnScore });
  }

  currentThrows = [];
  document.getElementById('bust-msg').textContent = '';
  currentIdx = (currentIdx + 1) % players.length;
  if (currentIdx === 0) roundNum++;
  renderSidebar();
  renderThrowSlots();
  saveToURL();
}

document.getElementById('miss-btn').addEventListener('click', () => {
  registerThrow(0, 'Raté', '');
});
document.getElementById('confirm-btn').addEventListener('click', confirmTurn);

document.getElementById('undo-btn').addEventListener('click', () => {
  if (history.length === 0) return;
  const last = history.pop();
  players[last.playerIdx].score = last.oldScore;
  players[last.playerIdx].history.pop();
  currentIdx = last.playerIdx;
  currentThrows = [];
  document.getElementById('bust-msg').textContent = '';
  renderSidebar();
  renderThrowSlots();
  saveToURL();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('Recommencer la partie ?')) {
    initGame(startScore, players.map(p => p.name));
  }
});

// === RENDER ===
function renderThrowSlots() {
  for (let i = 0; i < 3; i++) {
    const slot = document.getElementById('slot-' + i);
    const val = slot.querySelector('.throw-slot-value');
    const sub = slot.querySelector('.throw-slot-mult');
    slot.className = 'throw-slot' + (i === currentThrows.length && currentThrows.length < 3 ? ' active' : '');
    if (i < currentThrows.length) {
      const t = currentThrows[i];
      val.textContent = t.score;
      sub.textContent = t.label !== String(t.score) ? t.label : '';
      if (t.mult === 'triple') slot.classList.add('slot-triple');
      if (t.mult === 'double') slot.classList.add('slot-double');
      if (t.mult === 'bull') slot.classList.add('slot-bull');
    } else {
      val.textContent = '—';
      sub.textContent = '';
    }
  }
  document.getElementById('confirm-btn').disabled = currentThrows.length === 0;

  // Update throw dots
  const dotsEl = document.getElementById('throws-counter');
  dotsEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const d = document.createElement('div');
    d.className = 'throw-dot' + (i < currentThrows.length ? ' used' : '');
    dotsEl.appendChild(d);
  }
}

function renderSidebar() {
  document.getElementById('turn-name').textContent = players[currentIdx]?.name || '—';
  const list = document.getElementById('players-list');
  list.innerHTML = '';
  players.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'player-card' + (i === currentIdx ? ' active' : '');
    const lastThrows = (p.history[p.history.length - 1]?.throws || []).map(t => {
      const cls = t.mult === 'triple' ? 'triple' : t.mult === 'double' ? 'double' : t.mult === 'bull' ? 'bull' : '';
      return `<span class="throw-badge ${cls}">${t.score}</span>`;
    }).join('');
    card.innerHTML = `
      <div class="player-name-row">
        <span class="player-name">${p.name}</span>
        <div class="active-dot"></div>
      </div>
      <div class="player-score">${p.score}</div>
      <div class="player-throws">${lastThrows}</div>
    `;
    list.appendChild(card);
  });
}

function triggerWin() {
  const winner = players[currentIdx];
  document.getElementById('win-name').textContent = winner.name;
  const throws = totalThrowsCount[currentIdx];
  document.getElementById('win-stats').textContent = `Partie terminée en ${throws} fléchette${throws > 1 ? 's' : ''} · Manche ${roundNum}`;
  document.getElementById('win-screen').style.display = 'flex';
  saveToURL();
}

document.getElementById('win-setup-btn').addEventListener('click', () => {
  document.getElementById('win-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  playerNames = players.map(p => p.name);
  renderSetup();
  const url = new URL(window.location.href);
  url.searchParams.delete('g');
  window.history.replaceState({}, '', url.toString());
});

document.getElementById('win-rematch-btn').addEventListener('click', () => {
  document.getElementById('win-screen').style.display = 'none';
  initGame(startScore, players.map(p => p.name));
});

// === BOOT ===
if (loadFromURL()) {
  resumeGame();
} else {
  document.getElementById('setup-screen').style.display = 'flex';
}
</script>
